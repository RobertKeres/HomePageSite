services:
  homepage:
    build: .
    container_name: homepagesite
    restart: unless-stopped
    ports:
      - "${PORT:-8080}:8080"
    environment:
      PORT: "8080"
      DATA_DIR: /data
      STATIC_DIR: /app/static
      # Optional: create .env from .env.example and set CONFIG_TOKEN
      CONFIG_TOKEN: ${CONFIG_TOKEN:-}
    volumes:
      - ./data:/data
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:8080/api/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))",
        ]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 10s
